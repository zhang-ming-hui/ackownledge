<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>B站多媒体检索与抽取系统</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --paper: #ffffff;
      --ink: #1a1e2c;
      --muted: #6b7280;
      --line: #d1d5db;
      --line-soft: #e5e7eb;
      --accent: #fb7299;
      --accent-soft: #fef0f4;
      --accent-text: #c94d6e;
      --green: #059669;
      --green-soft: #d1fae5;
      --amber: #d97706;
      --amber-soft: #fef3c7;
      --purple: #7c3aed;
      --purple-soft: #ede9fe;
      --red-soft: #fee2e2;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
      --shadow-md: 0 4px 14px rgba(0,0,0,.08);
    }
    *,*::before,*::after{box-sizing:border-box}
    body {
      margin:0; font-family:'PingFang SC','Microsoft YaHei',sans-serif;
      font-size:14px; line-height:1.6; background:linear-gradient(135deg,#fce4ec 0%,var(--bg) 50%,#e8f5e9 100%);
      color:var(--ink); min-height:100vh;
    }
    /* ─── Top Bar ─── */
    .topbar {
      display:flex; align-items:center; gap:12px; padding:12px 20px;
      background:rgba(255,255,255,.95); border-bottom:1px solid var(--line);
      backdrop-filter:blur(10px); position:sticky; top:0; z-index:100;
    }
    .topbar .logo { font-size:20px; font-weight:700; color:var(--accent); white-space:nowrap; }
    .topbar .logo span { color:var(--muted); font-weight:400; font-size:14px; margin-left:6px; }
    .search-box {
      flex:1; display:flex; gap:8px; max-width:600px;
    }
    .search-box input {
      flex:1; border:1.5px solid var(--line); border-radius:var(--radius-md);
      padding:10px 16px; font-size:14px; outline:none; background:var(--paper);
    }
    .search-box input:focus { border-color:var(--accent); }
    .search-box select, .search-box button {
      border:1.5px solid var(--line); border-radius:var(--radius-md);
      padding:10px 16px; font-size:13px; cursor:pointer; background:var(--paper);
    }
    .search-box button {
      background:var(--accent); color:#fff; border:none; font-weight:600;
    }
    .search-box button:hover { opacity:.9; }
    .mode-btns { display:flex; gap:4px; }
    .mode-btn {
      padding:6px 12px; border:1px solid var(--line); border-radius:var(--radius-sm);
      font-size:12px; cursor:pointer; background:var(--paper); color:var(--muted);
    }
    .mode-btn.active { background:var(--accent-soft); color:var(--accent-text); border-color:var(--accent); }

    /* ─── Three Column Layout ─── */
    .layout { display:grid; grid-template-columns:280px 1fr 320px; gap:0; height:calc(100vh - 57px); }
    .panel { overflow-y:auto; padding:16px; }
    .panel-left { border-right:1px solid var(--line); background:rgba(255,255,255,.8); }
    .panel-center { background:var(--bg); }
    .panel-right { border-left:1px solid var(--line); background:rgba(255,255,255,.8); }

    /* ─── Left: Video List ─── */
    .cat-filter { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
    .cat-chip {
      padding:3px 10px; border-radius:999px; font-size:11px; cursor:pointer;
      border:1px solid var(--line); background:var(--paper); color:var(--muted);
      white-space:nowrap;
    }
    .cat-chip.active, .cat-chip:hover { background:var(--accent-soft); color:var(--accent-text); border-color:var(--accent); }
    .video-card {
      display:flex; gap:10px; padding:10px; border-radius:var(--radius-sm);
      cursor:pointer; margin-bottom:6px; border:2px solid transparent;
      transition:all .15s;
    }
    .video-card:hover { background:var(--accent-soft); }
    .video-card.selected { background:var(--accent-soft); border-color:var(--accent); }
    .video-card img {
      width:80px; height:50px; border-radius:6px; object-fit:cover; flex-shrink:0;
      background:var(--line-soft);
    }
    .video-card .info { min-width:0; }
    .video-card .info .title {
      font-size:13px; font-weight:600; line-height:1.3;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .video-card .info .meta { font-size:11px; color:var(--muted); margin-top:3px; }
    .video-card .info .meta .cat-badge {
      display:inline-block; padding:1px 6px; border-radius:999px;
      background:var(--accent-soft); color:var(--accent-text); font-size:10px;
    }

    /* ─── Center: Detail ─── */
    .empty-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100%; color:var(--muted); text-align:center; padding:40px;
    }
    .empty-state .icon { font-size:64px; margin-bottom:16px; opacity:.5; }
    .detail-header {
      display:flex; gap:16px; padding:16px; background:var(--paper);
      border-radius:var(--radius-lg); margin-bottom:16px; box-shadow:var(--shadow-sm);
    }
    .detail-header img {
      width:200px; height:125px; border-radius:var(--radius-md); object-fit:cover;
    }
    .detail-header .meta { flex:1; }
    .detail-header h2 { margin:0 0 8px; font-size:20px; line-height:1.3; }
    .detail-header .stats { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .stat-item {
      font-size:12px; color:var(--muted); display:flex; align-items:center; gap:3px;
    }
    .stat-item strong { color:var(--ink); }

    .ext-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .ext-card {
      background:var(--paper); border-radius:var(--radius-md); padding:14px;
      box-shadow:var(--shadow-sm);
    }
    .ext-card h3 {
      margin:0 0 8px; font-size:13px; color:var(--muted);
      display:flex; align-items:center; gap:6px;
    }
    .ext-card .values { display:flex; flex-wrap:wrap; gap:4px; }
    .tag {
      display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:500;
    }
    .tag-platform { background:var(--accent-soft); color:var(--accent-text); }
    .tag-category { background:#e0e7ff; color:#4338ca; }
    .tag-entity { background:var(--green-soft); color:#065f46; }
    .tag-action { background:var(--amber-soft); color:#92400e; }
    .tag-keyword { background:var(--purple-soft); color:#5b21b6; }
    .tag-metric { background:var(--red-soft); color:#991b1b; }

    .summary-box {
      background:var(--paper); border-radius:var(--radius-md); padding:14px;
      margin-top:12px; box-shadow:var(--shadow-sm); font-size:13px; line-height:1.7;
      color:var(--ink); border-left:3px solid var(--accent);
    }

    /* ─── Right: Stats ─── */
    .stat-section { margin-bottom:20px; }
    .stat-section h3 {
      font-size:14px; margin:0 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line-soft);
    }
    .stat-row {
      display:flex; justify-content:space-between; padding:4px 0; font-size:12px;
    }
    .stat-row .key { color:var(--muted); }
    .stat-row .val { font-weight:600; }
    .bar {
      height:6px; border-radius:3px; background:var(--line-soft); margin:4px 0 10px;
    }
    .bar-fill { height:100%; border-radius:3px; background:var(--accent); transition:width .3s; }
    .top-tags { display:flex; flex-wrap:wrap; gap:3px; }
    .top-tags .tag { cursor:pointer; }
    .top-tags .tag:hover { opacity:.8; }

    .loading { text-align:center; padding:20px; color:var(--muted); }

    @media (max-width:1100px) {
      .layout { grid-template-columns:1fr; grid-template-rows:auto 1fr auto; }
      .panel-left, .panel-right { max-height:250px; }
    }
    @media (max-width:700px) {
      .search-box { flex-direction:column; }
      .ext-cards { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎬 B站<span>多媒体检索与抽取</span></div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索标题、描述、UP主… (支持中文)"
           onkeydown="if(event.key==='Enter') doSearch()">
    <div class="mode-btns">
      <button class="mode-btn active" data-mode="hybrid" onclick="setMode('hybrid',this)">混合</button>
      <button class="mode-btn" data-mode="text" onclick="setMode('text',this)">文本</button>
      <button class="mode-btn" data-mode="image" onclick="setMode('image',this)">图片</button>
    </div>
    <button onclick="doSearch()">🔍 搜索</button>
  </div>
</div>

<div class="layout">
  <!-- LEFT: Video Browser -->
  <div class="panel panel-left" id="leftPanel">
    <div class="cat-filter" id="catFilter">
      <span class="cat-chip active" onclick="filterByCat('')">全部 ({{total}})</span>
    </div>
    <div id="videoList"></div>
  </div>

  <!-- CENTER: Detail -->
  <div class="panel panel-center" id="centerPanel">
    <div class="empty-state">
      <div class="icon">👈</div>
      <p>从左侧列表选择一个视频<br>查看抽取结果</p>
    </div>
  </div>

  <!-- RIGHT: Stats -->
  <div class="panel panel-right" id="rightPanel">
    <div class="stat-section">
      <h3>📊 数据概览</h3>
      <div class="stat-row"><span class="key">总视频数</span><span class="val">{{total}}</span></div>
      <div class="stat-row"><span class="key">来源</span><span class="val">B站热门</span></div>
    </div>
    <div class="stat-section">
      <h3>📈 分类分布</h3>
      <div id="catDist"></div>
    </div>
    <div class="stat-section">
      <h3>🏷️ 热门分类</h3>
      <div class="top-tags" id="hotCategories"></div>
    </div>
  </div>
</div>

<script>
let currentMode = 'hybrid';
let currentBvid = null;
let allVideos = {{ videos | tojson }};
let reportData = {{ report | tojson }};

// ── Init ──
function init() {
  renderVideoList(allVideos);
  loadCategories();
  renderStats();
}

// ── Category Filter ──
async function loadCategories() {
  const resp = await fetch('/api/categories');
  const cats = await resp.json();
  const container = document.getElementById('catFilter');
  const allChip = container.querySelector('.cat-chip');
  container.innerHTML = '';
  container.appendChild(allChip);
  cats.forEach(c => {
    const chip = document.createElement('span');
    chip.className = 'cat-chip';
    chip.textContent = `${c.name} (${c.count})`;
    chip.onclick = () => filterByCat(c.name);
    container.appendChild(chip);
  });
}

function filterByCat(cat) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  const filtered = cat ? allVideos.filter(v => v.category === cat) : allVideos;
  renderVideoList(filtered);
}

// ── Video List ──
function renderVideoList(videos) {
  const container = document.getElementById('videoList');
  container.innerHTML = videos.map(v => `
    <div class="video-card ${v.bvid === currentBvid ? 'selected' : ''}" onclick="selectVideo('${v.bvid}')">
      <img src="/covers/${v.bvid}.jpg" onerror="this.style.display='none'" alt="">
      <div class="info">
        <div class="title">${esc(v.title)}</div>
        <div class="meta">
          <span class="cat-badge">${esc(v.category)}</span>
          &middot; ${esc(v.owner_name)} &middot; ${fmtNum(v.stat_view || 0)}播放
        </div>
      </div>
    </div>
  `).join('');
}

// ── Select Video ──
async function selectVideo(bvid) {
  currentBvid = bvid;
  // Highlight
  document.querySelectorAll('.video-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.video-card[onclick*="${bvid}"]`);
  if (card) card.classList.add('selected');

  // Fetch detail
  const resp = await fetch(`/api/video/${bvid}`);
  const data = await resp.json();
  if (data.error) return;
  renderDetail(data.video, data.extraction);
}

function renderDetail(video, ext) {
  const v = video;
  document.getElementById('centerPanel').innerHTML = `
    <div class="detail-header">
      <img src="/covers/${v.bvid}.jpg" onerror="this.style.display='none'" alt="">
      <div class="meta">
        <h2>${esc(v.title)}</h2>
        <div style="color:var(--muted);font-size:13px">
          <span class="cat-badge">${esc(v.category)}</span>
          &middot; ${esc(v.owner_name)} &middot; ${esc(v.publish_date)}
        </div>
        <div class="stats">
          <span class="stat-item">👁 <strong>${fmtNum(v.stat_view)}</strong> 播放</span>
          <span class="stat-item">👍 <strong>${fmtNum(v.stat_like)}</strong></span>
          <span class="stat-item">🪙 <strong>${fmtNum(v.stat_coin)}</strong></span>
          <span class="stat-item">⭐ <strong>${fmtNum(v.stat_favorite)}</strong></span>
          <span class="stat-item">💬 <strong>${fmtNum(v.stat_danmaku)}</strong> 弹幕</span>
          <span class="stat-item">⏱ ${v.duration_display}</span>
        </div>
      </div>
    </div>

    <div class="ext-cards">
      ${renderFieldCard('📱 平台', 'tag-platform', ext.platforms || [])}
      ${renderFieldCard('📂 分类', 'tag-category', ext.categories || [])}
      ${renderFieldCard('🎬 内容类型', 'tag-action', ext.action_types || [])}
      ${renderFieldCard('🔑 关键实体', 'tag-entity', ext.entities || [])}
      ${renderFieldCard('🏷️ 关键词', 'tag-keyword', ext.keywords || [])}
      ${renderMetricsCard(ext.metrics || [])}
    </div>

    ${ext.summary ? `<div class="summary-box">📝 ${esc(ext.summary)}</div>` : ''}
    ${v.description ? `<div class="summary-box" style="border-left-color:var(--muted);margin-top:8px;">📄 简介：${esc(v.description).substring(0,300)}${v.description.length>300?'...':''}</div>` : ''}
  `;
}

function renderFieldCard(icon, tagClass, values) {
  if (!values || values.length === 0) {
    return `<div class="ext-card"><h3>${icon}</h3><span style="color:var(--muted);font-size:12px">—</span></div>`;
  }
  return `<div class="ext-card">
    <h3>${icon} <span style="font-size:11px;color:var(--muted)">${values.length}项</span></h3>
    <div class="values">${values.map(v => `<span class="tag ${tagClass}">${esc(v)}</span>`).join('')}</div>
  </div>`;
}

function renderMetricsCard(metrics) {
  if (!metrics || metrics.length === 0) {
    return `<div class="ext-card"><h3>📊 指标</h3><span style="color:var(--muted);font-size:12px">—</span></div>`;
  }
  const items = metrics.map(m => `<span class="tag tag-metric">${esc(m.name)}: ${esc(String(m.value))} ${esc(m.unit||'')}</span>`).join('');
  return `<div class="ext-card">
    <h3>📊 指标 <span style="font-size:11px;color:var(--muted)">${metrics.length}项</span></h3>
    <div class="values">${items}</div>
  </div>`;
}

// ── Search ──
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { renderVideoList(allVideos); return; }
  document.getElementById('videoList').innerHTML = '<div class="loading">搜索中…</div>';
  const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}&mode=${currentMode}&top_k=20&min_score=0.0`);
  const data = await resp.json();
  renderVideoList(data.results);
  document.getElementById('centerPanel').innerHTML = `
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>搜索 "${esc(q)}" 找到 ${data.results.length} 个结果<br>点击左侧结果查看详情</p>
    </div>`;
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Stats ──
function renderStats() {
  if (!reportData || !reportData.category_distribution) return;
  const cats = reportData.category_distribution;
  const maxCount = Math.max(...cats.map(c => c[1]));
  let html = '';
  cats.slice(0, 10).forEach(([name, count]) => {
    const pct = (count / maxCount * 100).toFixed(0);
    html += `<div style="margin-bottom:6px">
      <div class="stat-row"><span class="key">${esc(name)}</span><span class="val">${count}</span></div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  document.getElementById('catDist').innerHTML = html;

  // Hot categories as clickable tags
  let tagHtml = '';
  cats.slice(0, 12).forEach(([name, count]) => {
    tagHtml += `<span class="tag tag-category" onclick="filterByCat('${esc(name)}')" style="cursor:pointer">${esc(name)} ${count}</span>`;
  });
  document.getElementById('hotCategories').innerHTML = tagHtml;
}

// ── Helpers ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNum(n) { n = parseInt(n)||0; if(n>=10000) return (n/10000).toFixed(1)+'万'; return n.toLocaleString(); }

init();
</script>
</body>
</html>
