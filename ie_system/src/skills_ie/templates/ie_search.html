<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skills IE Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #edf3f7;
      --paper: rgba(255, 255, 255, 0.88);
      --paper-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(18, 42, 66, 0.12);
      --line-strong: rgba(18, 42, 66, 0.18);
      --ink: #112033;
      --ink-soft: #536174;
      --muted: #708096;
      --blue: #1260cc;
      --blue-soft: #dfeeff;
      --green: #17815d;
      --green-soft: #d9f5e8;
      --amber: #c87918;
      --amber-soft: #fff2da;
      --rose: #c74f5e;
      --rose-soft: #ffe2e7;
      --violet: #6454c8;
      --violet-soft: #e9e5ff;
      --slate-soft: #eff4f8;
      --shadow-lg: 0 24px 60px rgba(17, 32, 51, 0.12);
      --shadow-md: 0 14px 32px rgba(17, 32, 51, 0.08);
      --shadow-sm: 0 8px 18px rgba(17, 32, 51, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-sans: "Manrope", "Segoe UI", sans-serif;
      --font-mono: "IBM Plex Mono", "Cascadia Code", monospace;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(18, 96, 204, 0.14), transparent 32%),
        radial-gradient(circle at top right, rgba(23, 129, 93, 0.12), transparent 28%),
        linear-gradient(180deg, #f7fbff 0%, #edf3f7 44%, #e7f0f3 100%);
    }

    a { color: inherit; }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding: 20px 22px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: rgba(248, 252, 255, 0.9);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
    }

    .hero-left {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      min-width: 0;
    }

    .hero-mark {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(145deg, #1467d8, #0d4ea7);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(18, 96, 204, 0.26);
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero-copy p {
      margin: 8px 0 0;
      max-width: 760px;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .pill strong {
      display: block;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
    }

    .shell {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--paper);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .panel-subtitle {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .panel-count {
      flex-shrink: 0;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--slate-soft);
      color: var(--ink-soft);
      font-size: 11px;
      font-weight: 700;
    }

    .browser-controls {
      padding: 0 18px 18px;
      border-bottom: 1px solid var(--line);
    }

    .search-wrap,
    .select-wrap {
      margin-bottom: 10px;
    }

    .search-wrap input,
    .select-wrap select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      padding: 12px 14px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .search-wrap input:focus,
    .select-wrap select:focus {
      border-color: rgba(18, 96, 204, 0.45);
      box-shadow: 0 0 0 4px rgba(18, 96, 204, 0.08);
    }

    .active-filter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--blue-soft);
      color: #0b4eaa;
      font-size: 12px;
      font-weight: 700;
    }

    .clear-filter {
      border: none;
      background: transparent;
      color: inherit;
      font-size: 12px;
      font-weight: 800;
      padding: 0;
    }

    .browser-list {
      max-height: calc(100vh - 260px);
      overflow: auto;
      padding: 10px;
    }

    .skill-item {
      width: 100%;
      margin: 0 0 8px;
      padding: 14px 14px 14px 16px;
      border: 1px solid transparent;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.66);
      text-align: left;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }

    .skill-item:hover {
      transform: translateY(-1px);
      border-color: rgba(18, 96, 204, 0.18);
      box-shadow: var(--shadow-sm);
    }

    .skill-item.active {
      border-color: rgba(18, 96, 204, 0.26);
      background: linear-gradient(180deg, rgba(223, 238, 255, 0.84), rgba(255, 255, 255, 0.92));
      box-shadow: var(--shadow-sm);
    }

    .skill-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .skill-name {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: 800;
      color: var(--ink);
      word-break: break-word;
    }

    .signal {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(23, 129, 93, 0.14);
    }

    .skill-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--slate-soft);
      color: var(--ink-soft);
    }

    .skill-desc {
      margin: 0;
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .tag-platform { background: var(--blue-soft); color: #0b4eaa; }
    .tag-language { background: var(--green-soft); color: #0f6b4a; }
    .tag-action { background: var(--amber-soft); color: #a55d0b; }
    .tag-domain { background: var(--violet-soft); color: #5d4db7; }
    .tag-format { background: var(--slate-soft); color: #536174; }
    .tag-metric { background: var(--rose-soft); color: #a83a57; }

    .detail-shell {
      min-height: calc(100vh - 156px);
      display: flex;
      flex-direction: column;
    }

    .detail-scroll {
      padding: 22px;
    }

    .detail-empty {
      display: grid;
      place-items: center;
      min-height: 420px;
      padding: 40px;
      color: var(--ink-soft);
      text-align: center;
    }

    .empty-orb {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(18, 96, 204, 0.12), rgba(23, 129, 93, 0.12));
      color: var(--blue);
      font-size: 34px;
      font-weight: 800;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(24px, 2.4vw, 34px);
      line-height: 1.05;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .link-button,
    .ghost-button,
    .judge-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--ink);
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease, background .14s ease;
    }

    .link-button:hover,
    .ghost-button:hover,
    .judge-button:hover {
      transform: translateY(-1px);
      border-color: rgba(18, 96, 204, 0.28);
      box-shadow: var(--shadow-sm);
    }

    .summary-box,
    .judge-bar,
    .tab-strip,
    .raw-box,
    .notice-box {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .summary-box {
      padding: 16px 18px;
      margin-bottom: 16px;
      color: var(--ink-soft);
      line-height: 1.7;
    }

    .summary-box strong {
      color: var(--ink);
    }

    .judge-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .judge-label {
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 800;
      margin-right: 4px;
    }

    .judge-button {
      padding: 8px 12px;
    }

    .judge-button.is-correct { border-color: rgba(23, 129, 93, 0.28); background: var(--green-soft); color: #0f6b4a; }
    .judge-button.is-partial { border-color: rgba(200, 121, 24, 0.28); background: var(--amber-soft); color: #9f5b0d; }
    .judge-button.is-incorrect { border-color: rgba(199, 79, 94, 0.28); background: var(--rose-soft); color: #a43851; }

    .judge-feedback {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .tab-strip {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      margin-bottom: 16px;
    }

    .tab-button {
      border: none;
      border-radius: 14px;
      background: transparent;
      color: var(--ink-soft);
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 800;
    }

    .tab-button.active {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 10px 24px rgba(17, 32, 51, 0.18);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.82);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .field-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .field-head strong {
      display: block;
      font-size: 13px;
      font-weight: 800;
    }

    .field-head span {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }

    .field-body {
      padding: 16px;
    }

    .value-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .evidence-block {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 16px;
      background: var(--slate-soft);
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.6;
    }

    .evidence-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }

    .evidence-text {
      margin: 0;
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
    }

    .field-footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .mini-judge {
      padding: 7px 10px;
      font-size: 11px;
    }

    .empty-field {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .raw-box {
      padding: 18px;
    }

    .raw-box pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.72;
      color: var(--ink);
    }

    .stats-shell {
      max-height: calc(100vh - 156px);
      overflow: auto;
      padding: 10px;
    }

    .stats-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .stats-card-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
    }

    .stats-card-head h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
    }

    .stats-card-head p {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--muted);
    }

    .stats-card-body {
      padding: 14px 16px 16px;
    }

    .coverage-row {
      margin-bottom: 12px;
    }

    .coverage-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-soft);
    }

    .bar {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: #e6edf3;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #1467d8, #3ba0ff);
    }

    .bar > span.mid {
      background: linear-gradient(90deg, #e0a010, #f0bf55);
    }

    .bar > span.low {
      background: linear-gradient(90deg, #d75b67, #ef8790);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-box {
      padding: 12px;
      border-radius: 16px;
      background: var(--slate-soft);
      text-align: center;
    }

    .metric-box strong,
    .metric-box span {
      display: block;
    }

    .metric-box strong {
      font-family: var(--font-mono);
      font-size: 19px;
      color: var(--ink);
    }

    .metric-box span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(18, 42, 66, 0.08);
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-soft);
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-row strong {
      color: var(--ink);
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .hot-group {
      margin-bottom: 12px;
    }

    .hot-group:last-child {
      margin-bottom: 0;
    }

    .hot-label {
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .hot-values {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .hot-button {
      border: none;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
    }

    .hot-button small {
      margin-left: 4px;
      opacity: 0.75;
      font-size: 10px;
    }

    .loading-box,
    .error-box,
    .notice-box {
      padding: 18px;
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.7;
    }

    .error-box {
      border: 1px solid rgba(199, 79, 94, 0.22);
      background: rgba(255, 242, 244, 0.9);
      color: #8f2f48;
      border-radius: 18px;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 1280px) {
      .shell {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .stats-column {
        grid-column: 1 / -1;
      }

      .stats-shell {
        max-height: none;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        padding: 12px;
      }

      .stats-card {
        margin: 0;
      }
    }

    @media (max-width: 980px) {
      .hero {
        position: static;
        flex-direction: column;
      }

      .hero-pills {
        justify-content: flex-start;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .browser-list,
      .stats-shell,
      .detail-shell {
        max-height: none;
      }

      .field-grid,
      .stats-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 14px;
      }

      .hero,
      .detail-scroll {
        padding: 18px;
      }

      .panel-head,
      .browser-controls {
        padding-left: 14px;
        padding-right: 14px;
      }

      .detail-header {
        flex-direction: column;
      }

      .detail-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-left">
        <div class="hero-mark">IE</div>
        <div class="hero-copy">
          <h1>Skills IE Workbench</h1>
          <p>把你新增的完整 IE 前端工作台接到当前抽取系统上。页面会展示真实技能列表、字段抽取结果、证据片段、自动评测和人工评测统计。</p>
        </div>
      </div>
      <div class="hero-pills" id="hero-pills">
        <div class="pill"><strong>--</strong>加载中</div>
      </div>
    </header>

    <div id="global-error" class="error-box" style="display:none;"></div>

    <main class="shell">
      <aside class="panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">技能浏览器</h2>
            <p class="panel-subtitle">搜索、分类和热门值联动筛选</p>
          </div>
          <div class="panel-count" id="browser-count">--</div>
        </div>
        <div class="browser-controls">
          <div class="search-wrap">
            <input id="search-input" type="search" placeholder="搜索技能名、简介、字段值">
          </div>
          <div class="select-wrap">
            <select id="category-select">
              <option value="all">全部分类</option>
            </select>
          </div>
          <div id="active-filter-slot"></div>
        </div>
        <div id="browser-list" class="browser-list">
          <div class="loading-box">正在加载技能列表...</div>
        </div>
      </aside>

      <section class="panel">
        <div id="detail-root" class="detail-shell">
          <div class="detail-empty">
            <div>
              <div class="empty-orb">IE</div>
              <h2>正在准备详情面板</h2>
              <p class="muted">加载完成后会自动选中一个技能并展示抽取详情。</p>
            </div>
          </div>
        </div>
      </section>

      <aside class="panel stats-column">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">统计面板</h2>
            <p class="panel-subtitle">覆盖率、热点值、自动评测、人工评测</p>
          </div>
          <div class="panel-count" id="stats-count">--</div>
        </div>
        <div id="stats-root" class="stats-shell">
          <div class="loading-box">正在加载统计数据...</div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const INITIAL_QUERY = {{ initial_query|tojson }};
    const INITIAL_SKILL_ID = {{ initial_skill_id|tojson }};

    const FIELD_META = {
      platforms: { label: "平台", labelEn: "Platforms", tagClass: "tag-platform" },
      languages: { label: "技术", labelEn: "Languages", tagClass: "tag-language" },
      action_types: { label: "能力", labelEn: "Action Types", tagClass: "tag-action" },
      target_domains: { label: "领域", labelEn: "Target Domains", tagClass: "tag-domain" },
      output_formats: { label: "格式", labelEn: "Output Formats", tagClass: "tag-format" },
      metrics: { label: "指标", labelEn: "Metrics", tagClass: "tag-metric" },
    };

    const FIELD_ORDER = [
      "platforms",
      "languages",
      "action_types",
      "target_domains",
      "output_formats",
      "metrics",
    ];

    const state = {
      workbench: null,
      selectedSkillId: INITIAL_SKILL_ID || "",
      searchQuery: INITIAL_QUERY || "",
      selectedCategory: "all",
      activeFilter: null,
      activeTab: "extraction",
      detailCache: new Map(),
      detailLoading: false,
      localJudgments: {},
      detailFeedback: {},
      loadError: "",
    };

    const els = {
      heroPills: document.getElementById("hero-pills"),
      browserCount: document.getElementById("browser-count"),
      browserList: document.getElementById("browser-list"),
      statsCount: document.getElementById("stats-count"),
      statsRoot: document.getElementById("stats-root"),
      detailRoot: document.getElementById("detail-root"),
      searchInput: document.getElementById("search-input"),
      categorySelect: document.getElementById("category-select"),
      activeFilterSlot: document.getElementById("active-filter-slot"),
      globalError: document.getElementById("global-error"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeUrl(url) {
      const value = String(url || "").trim();
      return /^https?:\/\//i.test(value) ? value : "#";
    }

    function fieldLabel(field) {
      return FIELD_META[field]?.label || field;
    }

    function fieldTagClass(field) {
      return FIELD_META[field]?.tagClass || "tag-format";
    }

    function normalizeText(value) {
      return String(value || "").toLowerCase();
    }

    function metricText(metric) {
      if (!metric || typeof metric !== "object") {
        return "";
      }
      return `${metric.value ?? ""} ${metric.unit ?? ""}`.trim();
    }

    function fieldValuesToText(values, field) {
      if (!Array.isArray(values)) {
        return "";
      }
      if (field === "metrics") {
        return values.map(metricText).filter(Boolean).join(" | ");
      }
      return values.map((value) => String(value || "")).filter(Boolean).join(" | ");
    }

    function buildSummarySentence(event) {
      const extraction = event.extraction || {};
      const platforms = extraction.platforms?.join(" / ") || "未知平台";
      const languages = extraction.languages?.join(" / ") || "未知技术";
      const actions = extraction.action_types?.join(" / ") || "未知能力";
      const domains = extraction.target_domains?.join(" / ") || "未知领域";
      const formats = extraction.output_formats?.join(" / ") || "未知格式";

      return `该技能主要运行在 ${platforms}，使用 ${languages}，执行 ${actions}，面向 ${domains} 场景，并输出 ${formats}。`;
    }

    function getEvents() {
      return state.workbench?.events || [];
    }

    function getFilteredEvents() {
      const query = normalizeText(state.searchQuery);
      return getEvents().filter((event) => {
        if (state.selectedCategory !== "all" && event.category !== state.selectedCategory) {
          return false;
        }

        if (state.activeFilter) {
          const values = event.extraction?.[state.activeFilter.field] || [];
          const hasValue = values.some((value) => {
            const text = state.activeFilter.field === "metrics" ? metricText(value) : String(value || "");
            return normalizeText(text) === normalizeText(state.activeFilter.value);
          });
          if (!hasValue) {
            return false;
          }
        }

        if (!query) {
          return true;
        }

        const searchable = [
          event.skill_name,
          event.owner,
          event.category,
          event.description_preview,
          event.event_summary,
          ...FIELD_ORDER.flatMap((field) => {
            const values = event.extraction?.[field] || [];
            return field === "metrics" ? values.map(metricText) : values;
          }),
        ]
          .filter(Boolean)
          .join(" || ")
          .toLowerCase();

        return searchable.includes(query);
      });
    }

    function ensureSelectedSkill() {
      const filtered = getFilteredEvents();
      if (!filtered.length) {
        state.selectedSkillId = "";
        return;
      }
      const stillVisible = filtered.some((event) => event.skill_id === state.selectedSkillId);
      if (!stillVisible) {
        state.selectedSkillId = filtered[0].skill_id;
      }
    }

    function updateUrl() {
      const url = new URL(window.location.href);
      if (state.searchQuery) {
        url.searchParams.set("q", state.searchQuery);
      } else {
        url.searchParams.delete("q");
      }
      if (state.selectedSkillId) {
        url.searchParams.set("skill_id", state.selectedSkillId);
      } else {
        url.searchParams.delete("skill_id");
      }
      window.history.replaceState({}, "", url);
    }

    function renderHero() {
      if (!state.workbench) {
        return;
      }
      const summary = state.workbench.summary || {};
      const filteredCount = getFilteredEvents().length;
      els.heroPills.innerHTML = `
        <div class="pill"><strong>${escapeHtml(summary.variant || "--")}</strong>抽取变体</div>
        <div class="pill"><strong>${escapeHtml(summary.total_docs ?? 0)}</strong>文档总数</div>
        <div class="pill"><strong>${escapeHtml(summary.total_extractions ?? 0)}</strong>抽取事件</div>
        <div class="pill"><strong>${escapeHtml(filteredCount)}</strong>当前筛选结果</div>
      `;
    }

    function renderCategoryOptions() {
      const events = getEvents();
      const categories = [...new Set(events.map((event) => event.category).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      els.categorySelect.innerHTML = `
        <option value="all">全部分类</option>
        ${categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join("")}
      `;
      els.categorySelect.value = state.selectedCategory;
    }

    function renderActiveFilter() {
      if (!state.activeFilter) {
        els.activeFilterSlot.innerHTML = "";
        return;
      }
      els.activeFilterSlot.innerHTML = `
        <div class="active-filter">
          <span>热门值筛选: ${escapeHtml(fieldLabel(state.activeFilter.field))} / ${escapeHtml(state.activeFilter.value)}</span>
          <button class="clear-filter" type="button" data-action="clear-filter">清除</button>
        </div>
      `;
    }

    function renderBrowser() {
      const filtered = getFilteredEvents();
      els.browserCount.textContent = `${filtered.length} / ${getEvents().length}`;

      if (!filtered.length) {
        els.browserList.innerHTML = `<div class="notice-box">当前筛选条件下没有技能。可以修改搜索词、分类，或清除热门值筛选。</div>`;
        return;
      }

      els.browserList.innerHTML = filtered
        .map((event) => {
          const extraction = event.extraction || {};
          const topTags = [
            ...((extraction.platforms || []).slice(0, 2).map((value) => ({ field: "platforms", value }))),
            ...((extraction.languages || []).slice(0, 2).map((value) => ({ field: "languages", value }))),
            ...((extraction.action_types || []).slice(0, 2).map((value) => ({ field: "action_types", value }))),
          ].slice(0, 4);

          return `
            <button class="skill-item ${event.skill_id === state.selectedSkillId ? "active" : ""}" type="button" data-action="select-skill" data-skill-id="${escapeHtml(event.skill_id)}">
              <div class="skill-top">
                <span class="skill-name">${escapeHtml(event.skill_name)}</span>
                <span class="signal" title="已抽取"></span>
              </div>
              <div class="skill-meta">
                <span class="meta-chip">${escapeHtml(event.category || "uncategorized")}</span>
                <span class="meta-chip">${escapeHtml(event.owner || "unknown")}</span>
                <span class="meta-chip">${escapeHtml(event.info_point_count || 0)} 个信息点</span>
              </div>
              <p class="skill-desc">${escapeHtml(event.description_preview || event.event_summary || "暂无简介")}</p>
              <div class="skill-tags">
                ${topTags.map((tag) => `<span class="tag ${fieldTagClass(tag.field)}">${escapeHtml(tag.value)}</span>`).join("")}
              </div>
            </button>
          `;
        })
        .join("");
    }

    function renderFieldValues(field, values) {
      if (!Array.isArray(values) || !values.length) {
        return `<p class="empty-field">该字段当前没有抽取到结构化值。</p>`;
      }

      const tags = values.map((value) => {
        const text = field === "metrics" ? metricText(value) : String(value || "");
        return `<span class="tag ${fieldTagClass(field)}">${escapeHtml(text)}</span>`;
      }).join("");

      return `<div class="value-row">${tags}</div>`;
    }

    function renderEvidence(field, detail) {
      const evidence = detail.extraction?.evidence?.[field] || [];
      if (!evidence.length) {
        return `<p class="empty-field">没有可展示的证据片段。</p>`;
      }

      return evidence.slice(0, 2).map((item) => {
        const source = item.rule_source || item.pattern_source || "unknown";
        const evidenceText = item.matched_text || item.context || item.value || "";
        return `
          <div class="evidence-block">
            <div class="evidence-top">
              <span>${escapeHtml(item.value || "value")}</span>
              <span>${escapeHtml(source)}</span>
            </div>
            <p class="evidence-text">${escapeHtml(evidenceText)}</p>
          </div>
        `;
      }).join("");
    }

    function getLocalJudgment(skillId, field) {
      return state.localJudgments?.[skillId]?.[field] || "";
    }

    function getFieldJudgeValue(detail, field) {
      const values = detail.extraction?.[field] || [];
      return fieldValuesToText(values, field);
    }

    function renderJudgeButtons(skillId, skillName, field, value, feedbackKey) {
      const current = getLocalJudgment(skillId, field);
      const feedback = state.detailFeedback?.[feedbackKey] || "";
      return `
        <div class="field-footer">
          <span class="judge-label">人工评测</span>
          <button class="judge-button mini-judge ${current === "correct" ? "is-correct" : ""}" type="button"
            data-action="judge" data-skill-name="${escapeHtml(skillName)}" data-skill-id="${escapeHtml(skillId)}"
            data-field="${escapeHtml(field)}" data-value="${escapeHtml(value)}" data-label="correct">准确</button>
          <button class="judge-button mini-judge ${current === "partial" ? "is-partial" : ""}" type="button"
            data-action="judge" data-skill-name="${escapeHtml(skillName)}" data-skill-id="${escapeHtml(skillId)}"
            data-field="${escapeHtml(field)}" data-value="${escapeHtml(value)}" data-label="partial">部分准确</button>
          <button class="judge-button mini-judge ${current === "incorrect" ? "is-incorrect" : ""}" type="button"
            data-action="judge" data-skill-name="${escapeHtml(skillName)}" data-skill-id="${escapeHtml(skillId)}"
            data-field="${escapeHtml(field)}" data-value="${escapeHtml(value)}" data-label="incorrect">不准确</button>
          <span class="judge-feedback">${escapeHtml(feedback)}</span>
        </div>
      `;
    }

    function renderDetail() {
      if (!state.selectedSkillId) {
        els.detailRoot.innerHTML = `
          <div class="detail-empty">
            <div>
              <div class="empty-orb">IE</div>
              <h2>没有可展示的技能</h2>
              <p class="muted">请调整筛选条件，或者清除当前热门值筛选。</p>
            </div>
          </div>
        `;
        return;
      }

      const detail = state.detailCache.get(state.selectedSkillId);
      if (!detail) {
        els.detailRoot.innerHTML = `
          <div class="detail-empty">
            <div>
              <div class="empty-orb">...</div>
              <h2>正在加载技能详情</h2>
              <p class="muted">详情面板会展示字段值、证据片段和原始文本。</p>
            </div>
          </div>
        `;
        return;
      }

      const extraction = detail.extraction || {};
      const overallFeedbackKey = `${detail.skill_id}:overall`;

      const fieldCards = FIELD_ORDER.map((field) => {
        const meta = FIELD_META[field];
        const values = extraction[field] || [];
        const judgeValue = getFieldJudgeValue(detail, field);
        const feedbackKey = `${detail.skill_id}:${field}`;
        return `
          <article class="field-card">
            <div class="field-head">
              <div>
                <strong>${escapeHtml(meta.label)}</strong>
                <span>${escapeHtml(meta.labelEn)}</span>
              </div>
              <span class="tag ${meta.tagClass}">${escapeHtml(Array.isArray(values) ? values.length : 0)} 项</span>
            </div>
            <div class="field-body">
              ${renderFieldValues(field, values)}
              ${renderEvidence(field, detail)}
              ${renderJudgeButtons(detail.skill_id, detail.skill_name, field, judgeValue, feedbackKey)}
            </div>
          </article>
        `;
      }).join("");

      const detailActions = `
        <div class="detail-actions">
          <a class="link-button" href="${escapeHtml(safeUrl(detail.detail_url))}" target="_blank" rel="noreferrer">查看原始技能页</a>
        </div>
      `;

      const mainContent = state.activeTab === "raw"
        ? `
          <div class="raw-box">
            <pre>${escapeHtml(detail.source_text || detail.description_preview || "暂无原始文本")}</pre>
          </div>
        `
        : `<div class="field-grid">${fieldCards}</div>`;

      els.detailRoot.innerHTML = `
        <div class="detail-scroll">
          <div class="detail-header">
            <div>
              <h2 class="detail-title">${escapeHtml(detail.skill_name)}</h2>
              <div class="detail-meta">
                <span class="meta-chip">${escapeHtml(detail.category || "uncategorized")}</span>
                <span class="meta-chip">${escapeHtml(detail.owner || "unknown")}</span>
                <span class="meta-chip">${escapeHtml(detail.variant || "--")}</span>
                <span class="meta-chip">${escapeHtml(detail.info_point_count || 0)} 个信息点</span>
                <span class="meta-chip">${escapeHtml(detail.evidence_count || 0)} 条证据</span>
              </div>
            </div>
            ${detailActions}
          </div>

          <div class="summary-box">
            <strong>摘要：</strong>${escapeHtml(buildSummarySentence(detail))}
            <div style="margin-top:10px;" class="muted">${escapeHtml(detail.description_preview || detail.event_summary || "")}</div>
          </div>

          <div class="judge-bar">
            <span class="judge-label">整体评测</span>
            <button class="judge-button ${getLocalJudgment(detail.skill_id, "overall") === "correct" ? "is-correct" : ""}" type="button"
              data-action="judge" data-skill-name="${escapeHtml(detail.skill_name)}" data-skill-id="${escapeHtml(detail.skill_id)}"
              data-field="overall" data-value="" data-label="correct">准确</button>
            <button class="judge-button ${getLocalJudgment(detail.skill_id, "overall") === "partial" ? "is-partial" : ""}" type="button"
              data-action="judge" data-skill-name="${escapeHtml(detail.skill_name)}" data-skill-id="${escapeHtml(detail.skill_id)}"
              data-field="overall" data-value="" data-label="partial">部分准确</button>
            <button class="judge-button ${getLocalJudgment(detail.skill_id, "overall") === "incorrect" ? "is-incorrect" : ""}" type="button"
              data-action="judge" data-skill-name="${escapeHtml(detail.skill_name)}" data-skill-id="${escapeHtml(detail.skill_id)}"
              data-field="overall" data-value="" data-label="incorrect">不准确</button>
            <span class="judge-feedback">${escapeHtml(state.detailFeedback?.[overallFeedbackKey] || "")}</span>
          </div>

          <div class="tab-strip">
            <button class="tab-button ${state.activeTab === "extraction" ? "active" : ""}" type="button" data-action="switch-tab" data-tab="extraction">结构化抽取</button>
            <button class="tab-button ${state.activeTab === "raw" ? "active" : ""}" type="button" data-action="switch-tab" data-tab="raw">原始文本</button>
          </div>

          ${mainContent}
        </div>
      `;
    }

    function ratePercent(value) {
      return Number(value || 0) * 100;
    }

    function percentText(value) {
      return `${Number(value || 0).toFixed(1)}%`;
    }

    function renderStats() {
      if (!state.workbench) {
        els.statsRoot.innerHTML = `<div class="loading-box">正在加载统计数据...</div>`;
        return;
      }

      const report = state.workbench.report || {};
      const manual = state.workbench.manual_metrics || {};
      const autoEval = state.workbench.auto_eval || {};
      const filtered = getFilteredEvents();
      els.statsCount.textContent = `${filtered.length} 当前结果`;

      const coverageRows = Object.entries(report.field_extraction_rates || {}).map(([field, info]) => {
        const percentage = ratePercent(info.rate);
        const barClass = percentage >= 50 ? "" : percentage >= 20 ? "mid" : "low";
        return `
          <div class="coverage-row">
            <div class="coverage-meta">
              <span>${escapeHtml(fieldLabel(field))}</span>
              <span>${escapeHtml(percentage.toFixed(1))}% (${escapeHtml(info.count)})</span>
            </div>
            <div class="bar"><span class="${barClass}" style="width:${Math.max(0, Math.min(100, percentage))}%"></span></div>
          </div>
        `;
      }).join("");

      const hotValues = Object.entries(report.top_values_per_field || {}).map(([field, values]) => `
        <div class="hot-group">
          <div class="hot-label">${escapeHtml(fieldLabel(field))}</div>
          <div class="hot-values">
            ${values.slice(0, 8).map((item) => `
              <button class="hot-button ${fieldTagClass(field)}" type="button" data-action="hot-filter" data-field="${escapeHtml(field)}" data-value="${escapeHtml(item[0])}">
                ${escapeHtml(item[0])}<small>${escapeHtml(item[1])}</small>
              </button>
            `).join("")}
          </div>
        </div>
      `).join("");

      const autoFieldRows = Object.entries(autoEval.field_metrics || {}).map(([field, info]) => `
        <div class="stat-row">
          <span>${escapeHtml(fieldLabel(field))}</span>
          <strong>${escapeHtml(percentText((info.avg_f1 || 0) * 100))}</strong>
        </div>
      `).join("");

      els.statsRoot.innerHTML = `
        <section class="stats-card">
          <div class="stats-card-head">
            <h3>字段覆盖率</h3>
            <p>按真实抽取结果计算，不再使用 mock 数据。</p>
          </div>
          <div class="stats-card-body">
            ${coverageRows || '<div class="notice-box">暂无覆盖率数据。</div>'}
            <div class="stat-row"><span>5 项及以上完整</span><strong>${escapeHtml(report.documents_with_all_fields || 0)}</strong></div>
            <div class="stat-row"><span>无抽取结果</span><strong>${escapeHtml(report.documents_with_no_extraction || 0)}</strong></div>
          </div>
        </section>

        <section class="stats-card">
          <div class="stats-card-head">
            <h3>热门抽取值</h3>
            <p>点击任一值会联动左侧列表筛选。</p>
          </div>
          <div class="stats-card-body">
            ${hotValues || '<div class="notice-box">暂无热门值统计。</div>'}
          </div>
        </section>

        <section class="stats-card">
          <div class="stats-card-head">
            <h3>自动评测</h3>
            <p>来自 ground truth 自动评测结果。</p>
          </div>
          <div class="stats-card-body">
            ${(autoEval.overall)
              ? `
                <div class="metric-grid">
                  <div class="metric-box"><strong>${escapeHtml(percentText((autoEval.overall.precision || 0) * 100))}</strong><span>Precision</span></div>
                  <div class="metric-box"><strong>${escapeHtml(percentText((autoEval.overall.recall || 0) * 100))}</strong><span>Recall</span></div>
                  <div class="metric-box"><strong>${escapeHtml(percentText((autoEval.overall.f1 || 0) * 100))}</strong><span>F1</span></div>
                </div>
                <div style="margin-top:12px;">
                  <div class="stat-row"><span>Ground Truth 样本</span><strong>${escapeHtml(autoEval.ground_truth_count || 0)}</strong></div>
                  <div class="stat-row"><span>匹配文档数</span><strong>${escapeHtml(autoEval.matched_documents || 0)}</strong></div>
                </div>
                <div style="margin-top:12px;">
                  ${autoFieldRows || '<div class="notice-box">暂无字段 F1 统计。</div>'}
                </div>
              `
              : '<div class="notice-box">未检测到可用的自动评测结果。</div>'
            }
          </div>
        </section>

        <section class="stats-card">
          <div class="stats-card-head">
            <h3>人工评测</h3>
            <p>提交整体或字段判断后，这里会实时更新。</p>
          </div>
          <div class="stats-card-body">
            ${(manual.total_judgments)
              ? `
                <div class="metric-box" style="margin-bottom:12px;">
                  <strong>${escapeHtml(percentText((manual.overall_accuracy || 0) * 100))}</strong>
                  <span>整体准确率</span>
                </div>
                <div class="stat-row"><span>总评测数</span><strong>${escapeHtml(manual.total_judgments)}</strong></div>
                <div class="stat-row"><span>准确</span><strong>${escapeHtml(manual.correct || 0)}</strong></div>
                <div class="stat-row"><span>部分准确</span><strong>${escapeHtml(manual.partial || 0)}</strong></div>
                <div class="stat-row"><span>不准确</span><strong>${escapeHtml(manual.incorrect || 0)}</strong></div>
              `
              : '<div class="notice-box">还没有人工评测记录。你可以在中间详情区直接提交判断。</div>'
            }
          </div>
        </section>
      `;
    }

    function renderAll() {
      renderHero();
      renderActiveFilter();
      renderBrowser();
      renderDetail();
      renderStats();
      updateUrl();
    }

    async function loadWorkbench() {
      try {
        const response = await fetch("/api/workbench");
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "failed to load workbench");
        }
        state.workbench = payload;
        state.loadError = "";
        els.globalError.style.display = "none";
        renderCategoryOptions();
        ensureSelectedSkill();
        renderAll();
        if (state.selectedSkillId) {
          await ensureDetailLoaded(state.selectedSkillId);
        }
      } catch (error) {
        state.loadError = error instanceof Error ? error.message : "unknown error";
        els.globalError.style.display = "";
        els.globalError.textContent = `加载 IE workbench 失败: ${state.loadError}`;
        els.browserList.innerHTML = `<div class="error-box">无法加载技能列表，请检查 Flask 服务日志。</div>`;
        els.statsRoot.innerHTML = `<div class="error-box">无法加载统计数据。</div>`;
        els.detailRoot.innerHTML = `<div class="detail-empty"><div><div class="empty-orb">!</div><h2>详情加载失败</h2><p class="muted">${escapeHtml(state.loadError)}</p></div></div>`;
      }
    }

    async function ensureDetailLoaded(skillId) {
      if (!skillId || state.detailCache.has(skillId)) {
        renderDetail();
        return;
      }

      state.detailLoading = true;
      renderDetail();

      try {
        const response = await fetch(`/api/events/${encodeURIComponent(skillId)}`);
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "failed to load event detail");
        }
        state.detailCache.set(skillId, payload.event);
      } catch (error) {
        state.detailCache.set(skillId, {
          skill_id: skillId,
          skill_name: "详情加载失败",
          owner: "",
          category: "",
          detail_url: "",
          description_preview: error instanceof Error ? error.message : "unknown error",
          variant: "",
          event_summary: "",
          info_point_count: 0,
          evidence_count: 0,
          extraction: {
            platforms: [],
            languages: [],
            action_types: [],
            target_domains: [],
            output_formats: [],
            metrics: [],
            evidence: {
              platforms: [],
              languages: [],
              action_types: [],
              target_domains: [],
              output_formats: [],
              metrics: [],
            },
          },
          source_text: "",
        });
      } finally {
        state.detailLoading = false;
        renderDetail();
      }
    }

    function setSelectedSkill(skillId) {
      if (!skillId || skillId === state.selectedSkillId) {
        return;
      }
      state.selectedSkillId = skillId;
      state.activeTab = "extraction";
      renderAll();
      ensureDetailLoaded(skillId);
    }

    function setLocalJudgment(skillId, field, label) {
      if (!state.localJudgments[skillId]) {
        state.localJudgments[skillId] = {};
      }
      state.localJudgments[skillId][field] = label;
    }

    async function submitJudge(button) {
      const skillName = button.dataset.skillName || "";
      const skillId = button.dataset.skillId || "";
      const field = button.dataset.field || "";
      const value = button.dataset.value || "";
      const label = button.dataset.label || "";
      const feedbackKey = `${skillId}:${field}`;

      state.detailFeedback[feedbackKey] = "提交中...";
      renderDetail();

      try {
        const response = await fetch("/api/judge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            skill_name: skillName,
            field,
            value,
            label,
          }),
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "judge request failed");
        }
        setLocalJudgment(skillId, field, label);
        state.workbench.manual_metrics = payload.summary || {};
        state.detailFeedback[feedbackKey] = "已保存";
      } catch (error) {
        state.detailFeedback[feedbackKey] = error instanceof Error ? `提交失败: ${error.message}` : "提交失败";
      }

      renderDetail();
      renderStats();
    }

    document.addEventListener("click", async (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) {
        return;
      }

      const action = target.dataset.action;
      if (action === "select-skill") {
        setSelectedSkill(target.dataset.skillId || "");
        return;
      }

      if (action === "switch-tab") {
        state.activeTab = target.dataset.tab || "extraction";
        renderDetail();
        return;
      }

      if (action === "hot-filter") {
        state.activeFilter = {
          field: target.dataset.field || "",
          value: target.dataset.value || "",
        };
        ensureSelectedSkill();
        renderAll();
        if (state.selectedSkillId) {
          await ensureDetailLoaded(state.selectedSkillId);
        }
        return;
      }

      if (action === "clear-filter") {
        state.activeFilter = null;
        ensureSelectedSkill();
        renderAll();
        if (state.selectedSkillId) {
          await ensureDetailLoaded(state.selectedSkillId);
        }
        return;
      }

      if (action === "judge") {
        await submitJudge(target);
      }
    });

    els.searchInput.addEventListener("input", async (event) => {
      state.searchQuery = event.target.value;
      ensureSelectedSkill();
      renderAll();
      if (state.selectedSkillId) {
        await ensureDetailLoaded(state.selectedSkillId);
      }
    });

    els.categorySelect.addEventListener("change", async (event) => {
      state.selectedCategory = event.target.value || "all";
      ensureSelectedSkill();
      renderAll();
      if (state.selectedSkillId) {
        await ensureDetailLoaded(state.selectedSkillId);
      }
    });

    els.searchInput.value = state.searchQuery;
    loadWorkbench();
  </script>
</body>
</html>
